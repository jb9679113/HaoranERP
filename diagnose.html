<!DOCTYPE html>
<html>
<head>
  <title>Supabase 诊断工具</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Supabase 诊断工具</h1>
  <button onclick="runDiagnostics()">运行诊断</button>
  <div id="results"></div>

  <script>
    const SUPABASE_URL = 'https://lqiviylpavrplbtlmhfi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxaXZpeWxwYXZycGxidGxtaGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTE1MzMsImV4cCI6MjA5Njg4NzUzM30.iIySql1z8R47ArQvcyjuCvpxi3Z1pA9JeSR45Wrjy7k';

    async function runDiagnostics() {
      const results = document.getElementById('results');
      results.innerHTML = '';

      // 测试 1: 检查连接
      addResult('info', '正在测试 Supabase 连接...');
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1`, {
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });
        if (response.ok) {
          addResult('success', '✅ Supabase 连接成功');
        } else {
          addResult('error', `❌ 连接失败: ${response.status}`);
        }
      } catch (e) {
        addResult('error', `❌ 连接异常: ${e.message}`);
        return;
      }

      // 测试 2: 检查 sales 表
      addResult('info', '正在检查 sales 表...');
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/sales?limit=1`, {
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });
        if (response.ok) {
          const data = await response.json();
          addResult('success', `✅ sales 表存在，数据: ${JSON.stringify(data)}`);
        } else {
          const errorText = await response.text();
          addResult('error', `❌ sales 表查询失败: ${response.status} - ${errorText}`);
        }
      } catch (e) {
        addResult('error', `❌ sales 表查询异常: ${e.message}`);
      }

      // 测试 3: 检查 products 表
      addResult('info', '正在检查 products 表...');
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/products?limit=1`, {
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });
        if (response.ok) {
          const data = await response.json();
          addResult('success', `✅ products 表存在，数据: ${JSON.stringify(data)}`);
        } else {
          const errorText = await response.text();
          addResult('error', `❌ products 表查询失败: ${response.status} - ${errorText}`);
        }
      } catch (e) {
        addResult('error', `❌ products 表查询异常: ${e.message}`);
      }

      // 测试 4: 检查 employees 表
      addResult('info', '正在检查 employees 表...');
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/employees?limit=1`, {
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });
        if (response.ok) {
          const data = await response.json();
          addResult('success', `✅ employees 表存在，数据: ${JSON.stringify(data)}`);
        } else {
          const errorText = await response.text();
          addResult('error', `❌ employees 表查询失败: ${response.status} - ${errorText}`);
        }
      } catch (e) {
        addResult('error', `❌ employees 表查询异常: ${e.message}`);
      }

      // 测试 5: 检查 customers 表
      addResult('info', '正在检查 customers 表...');
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/customers?limit=1`, {
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });
        if (response.ok) {
          const data = await response.json();
          addResult('success', `✅ customers 表存在，数据: ${JSON.stringify(data)}`);
        } else {
          const errorText = await response.text();
          addResult('error', `❌ customers 表查询失败: ${response.status} - ${errorText}`);
        }
      } catch (e) {
        addResult('error', `❌ customers 表查询异常: ${e.message}`);
      }
    }

    function addResult(type, message) {
      const results = document.getElementById('results');
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.innerHTML = `<strong>${message}</strong>`;
      results.appendChild(div);
    }
  </script>
</body>
</html>
